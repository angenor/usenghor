<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance en cours - Universit&eacute; Senghor</title>
  <style>
    :root {
      --brand-blue-600: #233da0;
      --brand-blue-700: #1c3080;
      --brand-blue-800: #152460;
      --brand-blue-900: #0e1840;
      --brand-red-500: #f32525;
      --brand-red-600: #d91f1f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--brand-blue-900) 0%, var(--brand-blue-800) 50%, var(--brand-blue-700) 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Logo */
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }

    /* Animated gear icon */
    .icon {
      width: 40px;
      height: 40px;
      margin-bottom: 1.5rem;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: rgba(255, 255, 255, 0.5);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .countdown-item {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      min-width: 80px;
    }

    .countdown-value {
      font-size: 2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
      margin-top: 0.25rem;
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      height: 6px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-red-500), var(--brand-red-600));
      border-radius: 100px;
      width: 0%;
      transition: width 1s linear;
    }

    .status-text {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 2.5rem;
    }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .lang-btn:hover, .lang-btn.active {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .brand {
      opacity: 0.5;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    [dir="rtl"] { direction: rtl; text-align: center; }

    /* When site is back */
    .ready .icon { animation: none; }
    .ready .icon svg { fill: #4ade80; }
    .ready .progress-bar { width: 100% !important; background: #4ade80; }
    .ready h1, .ready .subtitle { opacity: 0.5; }
  </style>
</head>

      Notre site fait peau neuve. Nous serons de retour dans quelques instants.

    <!-- Countdown -->
    <div class="countdown">
      <div class="countdown-item">
        <div class="countdown-value" id="minutes">03</div>
        <div class="countdown-label" id="minLabel">min</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value" id="seconds">00</div>
        <div class="countdown-label" id="secLabel">sec</div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p class="status-text" id="statusText">Verification en cours...</p>

    <p class="brand">Universite Senghor &mdash; Alexandrie</p>
  </div>

  <script>
    var TOTAL_SECONDS = 180;
    var POLL_INTERVAL = 5000;
    var remaining = TOTAL_SECONDS;
    var siteReady = false;

    var i18n = {
      fr: {
        title: 'Maintenance en cours',
        subtitle: 'Notre site fait peau neuve. Nous serons de retour dans quelques instants.',
        min: 'min',
        sec: 'sec',
        checking: 'Verification en cours...',
        almostReady: 'Encore un instant...',
        ready: 'Le site est de retour ! Redirection...',
        dir: 'ltr'
      },
      en: {
        title: 'Maintenance in progress',
        subtitle: 'Our site is being updated. We will be back in a few moments.',
        min: 'min',
        sec: 'sec',
        checking: 'Checking availability...',
        almostReady: 'Almost ready...',
        ready: 'The site is back! Redirecting...',
        dir: 'ltr'
      },
      ar: {
        title: '\u0627\u0644\u0635\u064a\u0627\u0646\u0629 \u062c\u0627\u0631\u064a\u0629',
        subtitle: '\u0645\u0648\u0642\u0639\u0646\u0627 \u0642\u064a\u062f \u0627\u0644\u062a\u062d\u062f\u064a\u062b. \u0633\u0646\u0639\u0648\u062f \u062e\u0644\u0627\u0644 \u0644\u062d\u0638\u0627\u062a \u0642\u0644\u064a\u0644\u0629.',
        min: '\u062f\u0642\u064a\u0642\u0629',
        sec: '\u062b\u0627\u0646\u064a\u0629',
        checking: '\u062c\u0627\u0631\u064a \u0627\u0644\u062a\u062d\u0642\u0642...',
        almostReady: '\u0644\u062d\u0638\u0627\u062a \u0642\u0644\u064a\u0644\u0629...',
        ready: '\u0627\u0644\u0645\u0648\u0642\u0639 \u0645\u062a\u0627\u062d \u0645\u062c\u062f\u062f\u0627! \u062c\u0627\u0631\u064a \u0627\u0644\u062a\u062d\u0648\u064a\u0644...',
        dir: 'rtl'
      }
    };

    var currentLang = 'fr';

    function setLang(lang, btn) {
      currentLang = lang;
      var t = i18n[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = t.dir;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('minLabel').textContent = t.min;
      document.getElementById('secLabel').textContent = t.sec;
      if (siteReady) {
        document.getElementById('statusText').textContent = t.ready;
      } else if (remaining <= 0) {
        document.getElementById('statusText').textContent = t.almostReady;
      } else {
        document.getElementById('statusText').textContent = t.checking;
      }
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
    }

    function updateCountdown() {
      if (siteReady) return;
      if (remaining > 0) {
        remaining--;
      }
      var min = Math.floor(remaining / 60);
      var sec = remaining % 60;
      document.getElementById('minutes').textContent = String(min).padStart(2, '0');
      document.getElementById('seconds').textContent = String(sec).padStart(2, '0');

      var progress = ((TOTAL_SECONDS - remaining) / TOTAL_SECONDS) * 100;
      document.getElementById('progressBar').style.width = Math.min(progress, 95) + '%';

      if (remaining <= 0) {
        document.getElementById('statusText').textContent = i18n[currentLang].almostReady;
      }
    }

    function checkHealth() {
      fetch('/health', { cache: 'no-store' })
        .then(function(res) {
          if (res.ok) {
            siteReady = true;
            document.body.classList.add('ready');
            document.getElementById('statusText').textContent = i18n[currentLang].ready;
            document.getElementById('minutes').textContent = '00';
            document.getElementById('seconds').textContent = '00';
            document.getElementById('progressBar').style.width = '100%';
            setTimeout(function() { window.location.href = '/'; }, 2000);
            return;
          }
          setTimeout(checkHealth, POLL_INTERVAL);
        })
        .catch(function() {
          setTimeout(checkHealth, POLL_INTERVAL);
        });
    }

    setInterval(updateCountdown, 1000);
    setTimeout(checkHealth, POLL_INTERVAL);
  </script>
</body>
</html>
